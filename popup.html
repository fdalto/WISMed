<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WISMed Upload Bridge</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main class="popup">
    <section id="link-card" class="status-card status-card--standby">
      <div class="status-card__head">
        <p class="status-card__eyebrow">Captura do Link</p>
        <img id="link-icon" class="status-card__icon" src="correct-icon.svg" alt="">
      </div>
      <h1 id="link-title" class="status-card__title">Standby</h1>
      <p id="link-detail" class="status-card__detail">Extensão inativa.</p>
      <p id="link-meta" class="status-card__meta"></p>
    </section>

    <section id="upload-card" class="status-card status-card--standby">
      <div class="status-card__head">
        <p class="status-card__eyebrow">Captura da Imagem</p>
        <img id="upload-icon" class="status-card__icon" src="correct-icon.svg" alt="">
      </div>
      <h2 id="upload-title" class="status-card__title">Standby</h2>
      <p id="upload-detail" class="status-card__detail">Extensão inativa.</p>
      <div class="progress">
        <div id="upload-progress-fill" class="progress__fill"></div>
      </div>
      <p id="upload-error" class="status-card__error"></p>
    </section>

    <footer class="footer">
      <div class="footer-row">
        <button id="retry-button" class="retry-button" type="button" hidden>Tentar novamente</button>
        <label class="switch-row">
          <span id="active-label">Extensão ativa</span>
          <input id="auto-mode" type="checkbox">
        </label>
      </div>
    </footer>
  </main>
  <script src="constants.js"></script>
  <script src="popup.js"></script>
</body>
</html>
