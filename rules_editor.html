<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WISMed Rules Editor</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --panel: #ffffff;
      --text: #0f172a;
      --muted: #475569;
      --line: #cbd5e1;
      --accent: #0ea5e9;
      --ok: #16a34a;
      --danger: #dc2626;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: linear-gradient(180deg, #eef5ff 0%, var(--bg) 100%);
      color: var(--text);
    }

    .app {
      max-width: 1100px;
      margin: 0 auto;
      padding: 16px;
      display: grid;
      gap: 12px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
    }

    h1, h2 { margin: 0 0 10px; }
    h1 { font-size: 22px; }
    h2 { font-size: 16px; }
    p { margin: 0 0 8px; color: var(--muted); }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    button, input, textarea {
      font: inherit;
    }

    button {
      border: 1px solid #0284c7;
      background: #0ea5e9;
      color: #fff;
      border-radius: 8px;
      padding: 8px 10px;
      cursor: pointer;
    }

    button.alt {
      background: #fff;
      color: #0369a1;
    }

    button.danger {
      background: #fff;
      color: var(--danger);
      border-color: #fca5a5;
    }

    button.ok {
      background: var(--ok);
      border-color: #15803d;
    }

    input[type="text"], input[type="number"] {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px;
      background: #fff;
      color: var(--text);
    }

    .grid {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    }

    .list-wrap {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      background: #f8fbff;
      display: grid;
      gap: 8px;
    }

    .item-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 6px;
      align-items: center;
    }

    .label {
      font-size: 12px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 0;
    }

    #json-preview {
      width: 100%;
      min-height: 260px;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      resize: vertical;
      background: #0b1220;
      color: #e2e8f0;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
    }

    .hint {
      font-size: 12px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="panel">
      <h1>WISMed Rules Editor</h1>
      <p>Edite termos genericos de dropdown/download e gere um novo JSON.</p>
      <div class="row">
        <button id="load-default">Carregar cloud_rules.sample.json</button>
        <label class="row">
          <span class="hint">ou carregar arquivo:</span>
          <input id="file-input" type="file" accept=".json,application/json">
        </label>
      </div>
      <p id="status" class="hint">Aguardando JSON...</p>
    </section>

    <section class="panel">
      <h2>Dados basicos</h2>
      <div class="grid">
        <div>
          <p class="label">configVersion</p>
          <input id="config-version" type="text" placeholder="2026-03-22">
        </div>
        <div>
          <p class="label">minimumScore (genericDownload)</p>
          <input id="minimum-score" type="number" min="0" step="1" value="24">
        </div>
      </div>
    </section>

    <section class="panel">
      <h2>Termos e seletores</h2>
      <div class="grid" id="lists-root"></div>
    </section>

    <section class="panel">
      <div class="row">
        <button id="generate" class="ok">Gerar JSON</button>
        <button id="download" class="alt">Baixar cloud_rules.sample.json</button>
        <button id="copy" class="alt">Copiar JSON</button>
      </div>
      <textarea id="json-preview" spellcheck="false"></textarea>
    </section>
  </main>

  <script>
    const LIST_FIELDS = [
      {
        id: "preferred",
        label: "downloadPriority.preferred",
        path: ["global", "downloadPriority", "preferred"],
        help: "Termos que aumentam o score do alvo de download (ex.: dicom, zip, estudo completo)."
      },
      {
        id: "avoid",
        label: "downloadPriority.avoid",
        path: ["global", "downloadPriority", "avoid"],
        help: "Termos que reduzem o score para evitar download errado (ex.: imagem atual, serie atual)."
      },
      {
        id: "dropdown-selectors",
        label: "genericDropdown.triggerSelectors",
        path: ["global", "genericDropdown", "triggerSelectors"],
        help: "Seletores CSS usados para encontrar blocos/botoes que podem abrir menu dropdown de download."
      },
      {
        id: "dropdown-texts",
        label: "genericDropdown.triggerTexts",
        path: ["global", "genericDropdown", "triggerTexts"],
        help: "Palavras esperadas no texto do botao/menu para confirmar que e um menu de baixar/exportar."
      },
      {
        id: "dropdown-click-selectors",
        label: "genericDropdown.clickSelectors",
        path: ["global", "genericDropdown", "clickSelectors"],
        help: "Seletores CSS do alvo real do clique para abrir o dropdown (seta, wrapper interno, botao)."
      },
      {
        id: "dropdown-presence-selectors",
        label: "genericDropdown.dropdownPresenceSelectors",
        path: ["global", "genericDropdown", "dropdownPresenceSelectors"],
        help: "Seletores que indicam que o menu dropdown existe dentro do bloco encontrado."
      },
      {
        id: "download-selectors",
        label: "genericDownload.candidateSelectors",
        path: ["global", "genericDownload", "candidateSelectors"],
        help: "Seletores CSS para listar elementos candidatos de download. A extensao calcula score nesses elementos."
      },
      {
        id: "download-texts",
        label: "genericDownload.actionTexts",
        path: ["global", "genericDownload", "actionTexts"],
        help: "Termos genericos de acao (download/baixar/exportar) que somam pontos no ranking de clique."
      }
    ];

    const nodes = {
      loadDefault: document.getElementById("load-default"),
      fileInput: document.getElementById("file-input"),
      status: document.getElementById("status"),
      configVersion: document.getElementById("config-version"),
      minimumScore: document.getElementById("minimum-score"),
      listsRoot: document.getElementById("lists-root"),
      generate: document.getElementById("generate"),
      download: document.getElementById("download"),
      copy: document.getElementById("copy"),
      preview: document.getElementById("json-preview")
    };

    let rulesData = null;

    function setStatus(text) {
      nodes.status.textContent = text;
    }

    function getByPath(obj, path) {
      return path.reduce((acc, key) => (acc && acc[key] !== undefined ? acc[key] : undefined), obj);
    }

    function setByPath(obj, path, value) {
      let target = obj;
      for (let i = 0; i < path.length - 1; i += 1) {
        const key = path[i];
        if (!target[key] || typeof target[key] !== "object") {
          target[key] = {};
        }
        target = target[key];
      }
      target[path[path.length - 1]] = value;
    }

    function normalizeList(values) {
      return (values || [])
        .map((v) => String(v || "").trim())
        .filter(Boolean);
    }

    function createListEditor(field, initialValues) {
      const wrapper = document.createElement("div");
      wrapper.className = "list-wrap";
      wrapper.dataset.fieldId = field.id;

      const title = document.createElement("p");
      title.className = "label";
      title.textContent = field.label;
      wrapper.appendChild(title);

      if (field.help) {
        const hint = document.createElement("p");
        hint.className = "hint";
        hint.textContent = field.help;
        wrapper.appendChild(hint);
      }

      const list = document.createElement("div");
      list.className = "list";
      wrapper.appendChild(list);

      const addRow = document.createElement("div");
      addRow.className = "row";
      const addInput = document.createElement("input");
      addInput.type = "text";
      addInput.placeholder = "Novo termo...";
      const addBtn = document.createElement("button");
      addBtn.type = "button";
      addBtn.textContent = "Adicionar";
      addBtn.className = "alt";
      addRow.appendChild(addInput);
      addRow.appendChild(addBtn);
      wrapper.appendChild(addRow);

      function appendItem(value) {
        const row = document.createElement("div");
        row.className = "item-row";
        const input = document.createElement("input");
        input.type = "text";
        input.value = value;
        const removeBtn = document.createElement("button");
        removeBtn.type = "button";
        removeBtn.className = "danger";
        removeBtn.textContent = "Remover";
        removeBtn.addEventListener("click", () => row.remove());
        row.appendChild(input);
        row.appendChild(removeBtn);
        list.appendChild(row);
      }

      normalizeList(initialValues).forEach(appendItem);

      addBtn.addEventListener("click", () => {
        const next = addInput.value.trim();
        if (!next) return;
        appendItem(next);
        addInput.value = "";
        addInput.focus();
      });

      addInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          event.preventDefault();
          addBtn.click();
        }
      });

      return wrapper;
    }

    function getEditorValues(wrapper) {
      return Array.from(wrapper.querySelectorAll(".item-row input"))
        .map((input) => input.value.trim())
        .filter(Boolean);
    }

    function renderEditors(data) {
      nodes.listsRoot.innerHTML = "";
      for (const field of LIST_FIELDS) {
        const current = getByPath(data, field.path);
        const editor = createListEditor(field, Array.isArray(current) ? current : []);
        nodes.listsRoot.appendChild(editor);
      }
    }

    function applyFormToRules() {
      if (!rulesData) return null;
      const copy = JSON.parse(JSON.stringify(rulesData));
      copy.configVersion = nodes.configVersion.value.trim() || copy.configVersion || "unknown";

      const score = Number(nodes.minimumScore.value);
      setByPath(copy, ["global", "genericDownload", "minimumScore"], Number.isFinite(score) ? score : 24);

      const wrappers = Array.from(nodes.listsRoot.querySelectorAll(".list-wrap"));
      for (const field of LIST_FIELDS) {
        const wrapper = wrappers.find((w) => w.dataset.fieldId === field.id);
        if (!wrapper) continue;
        const values = getEditorValues(wrapper);
        setByPath(copy, field.path, values);
      }
      return copy;
    }

    function updatePreview(data) {
      nodes.preview.value = JSON.stringify(data, null, 2);
    }

    function loadRulesObject(obj, sourceLabel) {
      if (!obj || typeof obj !== "object") {
        throw new Error("JSON invalido.");
      }
      rulesData = obj;
      nodes.configVersion.value = obj.configVersion || "";
      nodes.minimumScore.value = String(getByPath(obj, ["global", "genericDownload", "minimumScore"]) ?? 24);
      renderEditors(obj);
      updatePreview(obj);
      setStatus("JSON carregado: " + sourceLabel);
    }

    async function loadDefaultFile() {
      const response = await fetch("./cloud_rules.sample.json", { cache: "no-store" });
      if (!response.ok) {
        throw new Error("Falha ao carregar cloud_rules.sample.json");
      }
      const json = await response.json();
      loadRulesObject(json, "cloud_rules.sample.json");
    }

    nodes.loadDefault.addEventListener("click", async () => {
      try {
        await loadDefaultFile();
      } catch (error) {
        setStatus("Erro: " + error.message + ". Abra via servidor local (ex: Live Server).");
      }
    });

    nodes.fileInput.addEventListener("change", async (event) => {
      const file = event.target.files && event.target.files[0];
      if (!file) return;
      try {
        const content = await file.text();
        loadRulesObject(JSON.parse(content), file.name);
      } catch (error) {
        setStatus("Erro ao ler arquivo: " + error.message);
      }
    });

    nodes.generate.addEventListener("click", () => {
      const updated = applyFormToRules();
      if (!updated) {
        setStatus("Carregue um JSON primeiro.");
        return;
      }
      updatePreview(updated);
      setStatus("JSON atualizado no preview.");
    });

    nodes.download.addEventListener("click", () => {
      const updated = applyFormToRules();
      if (!updated) {
        setStatus("Carregue um JSON primeiro.");
        return;
      }
      const blob = new Blob([JSON.stringify(updated, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const anchor = document.createElement("a");
      anchor.href = url;
      anchor.download = "cloud_rules.sample.json";
      document.body.appendChild(anchor);
      anchor.click();
      anchor.remove();
      URL.revokeObjectURL(url);
      updatePreview(updated);
      setStatus("Arquivo gerado com sucesso.");
    });

    nodes.copy.addEventListener("click", async () => {
      const updated = applyFormToRules();
      if (!updated) {
        setStatus("Carregue um JSON primeiro.");
        return;
      }
      const content = JSON.stringify(updated, null, 2);
      try {
        await navigator.clipboard.writeText(content);
        setStatus("JSON copiado para a area de transferencia.");
      } catch {
        setStatus("Nao foi possivel copiar automaticamente. Copie pelo preview.");
      }
      updatePreview(updated);
    });
  </script>
</body>
</html>
